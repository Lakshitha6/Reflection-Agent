#---------------------- All moddels configurations ----------------------------

# Embedding Service (HuggingFace)
embeddings:
  active_provider: "hf"  # change this to 'openai' if want to change current provider 
  providers:
    hf:
      model: "sentence-transformers/all-mpnet-base-v2"

    # openai:
    #   model: "text-embedding-3-small"

# Vector Store (Qdrant)
vectorstore:
  active_provider: "qdrant"
  providers:
    qdrant:
      persist_directory: "data/vectordb"
      collection_name: "reflection_rag_collection"

# LLM Generation (Groq)
llm:
  active_provider: "groq"
  providers:
    groq:
      model: "llama-3.1-8b-instant"
      temperature: 0.0
      max_tokens: 1024
    # openai:
    #   model: "gpt-4o"
    #   temperature: 0.7

data:
  raw_path: "data/raw"

# Document Processing (For Ingestion)
processing:
  chunk_size: 1000
  chunk_overlap: 200